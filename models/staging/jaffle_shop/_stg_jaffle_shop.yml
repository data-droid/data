models:
  - name: stg_jaffle_shop__customers
    description: Staged customer records from the `jaffle_shop` source with renamed fields for consistent downstream use. The grain is one row per customer.
    columns:
      - name: customer_id
        description: Unique identifier for a customer, renamed from the source `id` column.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: Customer's first name as provided in the source system.
      - name: last_name
        description: Customer's last name as provided in the source system.

  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: Primary key for the orders table
        data_tests:
          - unique
          - not_null
      - name: order_status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  [
                    "completed",
                    "shipped",
                    "placed",
                    "return_pending",
                    "returned",
                  ]
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
